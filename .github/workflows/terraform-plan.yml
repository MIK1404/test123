name: Terraform Plan

on:
  pull_request:
    branches:
      - main
    paths:
      - 'test123/**'
      - '.github/workflows/terraform-plan.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform-plan:
    # Skip if this is a Dependabot PR - bot only provides suggestions
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./test123/abc

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: latest

      - name: Azure Login
        uses: azure/login@v2
        continue-on-error: true
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan 2>&1 | tee plan.log || true

      - name: Post Plan Results
        uses: actions/github-script@v7
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            let body = '';
            
            const planPath = path.join(process.cwd(), 'test123', 'abc', 'tfplan');
            const logPath = path.join(process.cwd(), 'test123', 'abc', 'plan.log');
            const planExists = fs.existsSync(planPath);
            
            console.log(`Current dir: ${process.cwd()}`);
            console.log(`Looking for plan at: ${planPath}`);
            console.log(`Plan file exists: ${planExists}`);
            console.log(`Looking for log at: ${logPath}`);
            
            let logContent = '';
            try {
              if (fs.existsSync(logPath)) {
                logContent = fs.readFileSync(logPath, 'utf8');
                console.log(`Log file found, size: ${logContent.length} bytes`);
              } else {
                console.log('Log file not found');
              }
            } catch (e) {
              console.log(`Error reading log: ${e.message}`);
            }
            
            const jobUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            
            // Check for any errors in the log
            const hasAzureError = logContent.includes('Not all values are present') || 
                                 logContent.includes('Service Principal') || 
                                 logContent.includes('auth-type') ||
                                 logContent.includes('AZURE_CLIENT_ID');
            const hasTerraformError = logContent.includes('Error:') || logContent.includes('error');
            
            if (hasAzureError || logContent.includes('azure')) {
              body = `## 🔴 Azure Authentication Failed

[View full logs →](${jobUrl})

**Error:** Missing or invalid Azure credentials

**🔧 Quick Fix - Add GitHub Secrets:**
1. Go to **Settings → Secrets and variables → Actions**
2. Click **New repository secret** and add these 3 values:

| Secret Name | Value |
|---------|-------|
| \`AZURE_CLIENT_ID\` | Your Azure Client ID |
| \`AZURE_TENANT_ID\` | Your Azure Tenant ID |
| \`AZURE_SUBSCRIPTION_ID\` | Your Azure Subscription ID |

**How to get these values:**
\`\`\`bash
az ad sp create-for-rbac --name "terraform-github" --role Contributor
\`\`\`

Once secrets are added, re-run the pipeline.`;
            } else if (!planExists) {
              const errorLines = logContent.split('\n').filter(l => l.includes('Error:') || l.includes('error') || l.includes('failed'));
              const errorMsg = errorLines.length > 0 ? errorLines.slice(0, 10).join('\n') : (logContent.split('\n').slice(-20).join('\n') || 'Check workflow logs for details');
              
              body = `## 🔴 Terraform Plan Failed

[View full logs →](${jobUrl})

**Error Details:**
\`\`\`
${errorMsg}
\`\`\`

**Common Fixes:**
- Verify \`terraform.tfvars\` has all required variables set
- Check Azure credentials are configured in GitHub Secrets
- Ensure Terraform files are in \`test123/abc/\` directory
- Review the logs for specific error messages`;
            } else {
              // SUCCESS - Format plan output as table
              try {
                const plan = fs.readFileSync(planPath, 'utf8');
                
                body = `## ✅ Terraform Plan Succeeded

<details>
<summary>📄 Full Plan Output</summary>

\\\`\\\`\\\`
\${plan}
\\\`\\\`\\\`

</details>`;
              } catch (err) {
                body = `## ✅ Terraform Plan Succeeded (could not parse output)`;
              }
            }
            
            if (!body) {
              body = `## ⚠️ Terraform Workflow Executed

[View full logs →](${jobUrl})

Unable to determine workflow status. Check logs for details.`;
            }
            
            console.log(`Posting comment with body length: ${body.length}`);
            console.log(`PR Number: ${context.issue.number || context.payload.pull_request.number}`);
            
            const prNumber = context.issue.number || context.payload.pull_request.number;
            if (!prNumber) {
              console.error('ERROR: Could not determine PR number');
              console.log('Context:', JSON.stringify(context, null, 2));
              return;
            }
            
            try {
              const response = await github.rest.issues.createComment({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
              console.log('Comment posted successfully!');
              console.log('Response:', response.status);
            } catch (error) {
              console.error('Failed to post comment:');
              console.error('Error:', error.message);
              console.error('Status:', error.status);
              throw error;
            }
