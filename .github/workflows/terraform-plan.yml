name: Terraform Plan

on:
  pull_request:
    branches:
      - main
    paths:
      - 'test123/**'
      - '.github/workflows/terraform-plan.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./abc

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: latest

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan 2>&1 | tee plan.log || true

      - name: Post Plan Results
        uses: actions/github-script@v7
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            let body = '';
            
            // Check if plan exists
            const planPath = path.join(process.cwd(), 'abc', 'tfplan');
            const logPath = path.join(process.cwd(), 'abc', 'plan.log');
            const planExists = fs.existsSync(planPath);
            
            console.log('Checking paths:');
            console.log('CWD:', process.cwd());
            console.log('Plan path:', planPath);
            console.log('Plan exists:', planExists);
            
            if (!planExists) {
              // Plan failed
              let errorLog = 'No error details available';
              try {
                if (fs.existsSync(logPath)) {
                  const log = fs.readFileSync(logPath, 'utf8');
                  const errors = log.split('\n').filter(l => l.includes('Error:') || l.includes('error')).slice(0, 5);
                  errorLog = errors.length > 0 ? errors.join('\n') : log.split('\n').slice(-20).join('\n');
                }
              } catch (e) {
                errorLog = 'Could not read logs: ' + e.message;
              }
              
              const jobUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
              
              body = `## 🔴 Terraform Plan Failed
[View full logs →](${jobUrl})

**Error Details:**
\`\`\`
${errorLog}
\`\`\`

**🔧 Quick Fixes:**
1. **Azure Secrets** → Add to GitHub Settings → Secrets and variables → Actions:
   - AZURE_CLIENT_ID
   - AZURE_TENANT_ID
   - AZURE_SUBSCRIPTION_ID

2. **terraform.tfvars** → Verify these variables exist:
   - resource_group_name
   - location
   - storage_account_name`;
            } else {
              // Plan succeeded
              try {
                const plan = fs.readFileSync(planPath, 'utf8');
                body = `## ✅ Terraform Plan Successful\n\n\`\`\`\n${plan}\n\`\`\``;
              } catch (err) {
                body = `## ✅ Terraform Plan Successful\n\n(Output not available)`;
              }
            }
            
            console.log('Posting comment with body:');
            console.log(body.substring(0, 200));
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
            
            console.log('Comment posted successfully!');
