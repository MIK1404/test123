name: Terraform Plan

on:
  pull_request:
    branches:
      - main
      - test1
    paths:
      - 'test123/**'
      - '.github/workflows/terraform-plan.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform-plan:
    # Skip if this is a Dependabot PR - bot only provides suggestions
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./test123/abc

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: latest

      - name: Azure Login
        id: azure-login
        uses: azure/login@v2
        continue-on-error: true
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: ./abc
        run: terraform init

      - name: Terraform Validate
        working-directory: ./abc
        run: terraform validate

      - name: Terraform Plan
        working-directory: ./abc
        id: tf-plan
        run: terraform plan -no-color -out=tfplan > plan.txt 2>&1 || true

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const planPath = path.join(process.cwd(), 'abc', 'plan.txt');
            console.log(`Reading from: ${planPath}`);
            
            let planOutput = 'No output available';
            try {
              if (fs.existsSync(planPath)) {
                planOutput = fs.readFileSync(planPath, 'utf8');
              }
            } catch (e) {
              console.log(`Error: ${e.message}`);
            }
            
            // Analyze the output for common issues
            const hasAuthError = planOutput.includes('unauthorized') || planOutput.includes('Authentication') || planOutput.includes('error authenticating');
            const hasInitError = planOutput.includes('error reading') || planOutput.includes('No configuration files found');
            const hasSyntaxError = planOutput.includes('Error: ') && (planOutput.includes('on ') && planOutput.includes('line'));
            const hasNoChanges = planOutput.includes('No changes') || planOutput.includes('no resources need to be destroyed');
            const isSuccess = planOutput.includes('will be') || (hasNoChanges && !hasAuthError);
            
            let comment = '';
            
            if (isSuccess) {
              // Success message
              comment = `## ✅ Terraform Plan Succeeded\n\n<details><summary>📄 View Plan Output</summary>\n\n\`\`\`\n${planOutput}\n\`\`\`\n\n</details>`;
            } else {
              // Build detailed failure message with suggestions
              comment = `## 🔴 Terraform Plan Failed\n\n[View full logs →](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n\nPlan execution encountered errors.\n\n`;
              
              comment += `<details><summary>📋 Error Output</summary>\n\n\`\`\`\n${planOutput}\n\`\`\`\n\n</details>\n\n`;
              
              comment += `### 🔧 Next Steps & Suggestions\n\n`;
              
              if (hasAuthError) {
                comment += `**Azure Authentication Failed**\n\n`;
                comment += `Configure GitHub Secrets with Azure credentials:\n`;
                comment += `- Go to Settings → Secrets and variables → Actions\n`;
                comment += `- Add these secrets:\n`;
                comment += `  - \`AZURE_CLIENT_ID\` - Azure App Registration Client ID\n`;
                comment += `  - \`AZURE_TENANT_ID\` - Azure Tenant ID\n`;
                comment += `  - \`AZURE_SUBSCRIPTION_ID\` - Azure Subscription ID\n\n`;
              }
              
              if (hasSyntaxError) {
                comment += `**Terraform Syntax Error Detected**\n\n`;
                comment += `- Review the .tf files for syntax errors\n`;
                comment += `- Check variable definitions and resource blocks\n`;
                comment += `- Run \`terraform validate\` locally to test\n\n`;
              }
              
              if (hasInitError) {
                comment += `**Terraform Initialization Issue**\n\n`;
                comment += `- Ensure all .tf files are present in the directory\n`;
                comment += `- Check terraform.tfvars file exists\n`;
                comment += `- Verify required_providers section is correct\n\n`;
              }
              
              comment += `**General Troubleshooting:**\n`;
              comment += `- Check the Actions workflow logs above for detailed error messages\n`;
              comment += `- Verify all required variables are set in terraform.tfvars\n`;
              comment += `- Ensure Terraform files are syntactically correct\n`;
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
