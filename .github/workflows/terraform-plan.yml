name: Terraform Plan

on:
  pull_request:
    branches:
      - main
      - test1
    paths:
      - 'test123/**'
      - '.github/workflows/terraform-plan.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform-plan:
    # Skip if this is a Dependabot PR - bot only provides suggestions
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./test123/abc

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: latest

      - name: Azure Login
        id: azure-login
        uses: azure/login@v2
        continue-on-error: true
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        id: init
        working-directory: ./abc
        run: terraform init

      - name: Terraform Validate
        id: validate
        working-directory: ./abc
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ./abc
        run: terraform plan -no-color -out=tfplan > plan.txt 2>&1

      - name: Post Plan to PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const script = require('${{ github.workspace }}/.github/scripts/post-terraform-plan.js');
            const outcomes = {
              azureLogin: '${{ steps.azure-login.outcome }}',
              init: '${{ steps.init.outcome }}',
              validate: '${{ steps.validate.outcome }}',
              plan: '${{ steps.plan.outcome }}'
            };
            await script({ github, context, outcomes });
