name: Terraform Plan

on:
  pull_request:
    branches:
      - main
      - test1
    paths:
      - 'test123/**'
      - '.github/workflows/terraform-plan.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform-plan:
    # Skip if this is a Dependabot PR - bot only provides suggestions
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./test123/abc

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: latest

      - name: Azure Login
        uses: azure/login@v2
        continue-on-error: true
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan 2>&1 | tee plan.log || true

      - name: Post Plan Results
        uses: actions/github-script@v7
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            
            console.log('=== Terraform Plan Post Processor ===');
            const cwd = process.cwd();
            console.log(`Working directory: ${cwd}`);
            
            // Use relative paths from current directory
            const planPath = './tfplan';
            const logPath = './plan.log';
            
            console.log(`Checking for: ${planPath}`);
            console.log(`Checking for: ${logPath}`);
            
            // List what's in current directory
            try {
              const files = fs.readdirSync('.');
              console.log('Files in current directory:', files.join(', '));
            } catch (e) {
              console.log('Could not list directory');
            }
            
            const planExists = fs.existsSync(planPath);
            console.log(`Plan file exists: ${planExists}`);
            
            let logContent = '';
            if (fs.existsSync(logPath)) {
              logContent = fs.readFileSync(logPath, 'utf8');
              console.log(`Log file size: ${logContent.length} bytes`);
            } else {
              logContent = 'No log file found';
            }
            
            const jobUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            let body = '';
            
            // Determine status
            if (!planExists) {
              body = `## 🔴 Terraform Plan Failed

[View full logs →](${jobUrl})

Plan file was not created. This usually means terraform init, validate, or plan failed.

**Last 20 lines of log:**
\`\`\`
${logContent.split('\\n').slice(-20).join('\\n') || 'No log output'}
\`\`\`

**Common causes:**
- Missing Azure credentials (set AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID secrets)
- Terraform syntax errors in your .tf files
- Missing terraform.tfvars file or invalid values`;
            } else {
              try {
                const planContent = fs.readFileSync(planPath, 'utf8');
                body = `## ✅ Terraform Plan Succeeded

<details>
<summary>📄 Full Plan Output</summary>

\\\`\\\`\\\`
${planContent}
\\\`\\\`\\\`

</details>`;
              } catch (err) {
                body = `## ✅ Plan file created but could not read content`;
              }
            }
            
            console.log(`Posting comment with length: ${body.length}`);
            console.log(`Context issue number: ${context.issue.number}`);
            console.log(`Payload PR number: ${context.payload.pull_request?.number}`);
            
            const prNumber = context.issue.number || context.payload.pull_request?.number;
            
            if (!prNumber) {
              console.error('ERROR: No PR number found!');
              console.log('Full context:', JSON.stringify({issue: context.issue, pr: context.payload.pull_request}, null, 2));
              body = `## ⚠️ Could not determine PR number`;
            }
            
            try {
              console.log(`Creating comment on PR ${prNumber}...`);
              const response = await github.rest.issues.createComment({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
              console.log('✅ Comment posted! Response:', response.status);
            } catch (error) {
              console.error('❌ Failed to post comment');
              console.error('Error message:', error.message);
              if (error.response) {
                console.error('Response status:', error.response.status);
                console.error('Response data:', JSON.stringify(error.response.data, null, 2));
              }
            }
