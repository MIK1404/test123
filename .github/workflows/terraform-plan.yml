name: Terraform Plan

on:
  pull_request:
    branches:
      - main
      - test1
    paths:
      - 'test123/**'
      - '.github/workflows/terraform-plan.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform-plan:
    # Skip if this is a Dependabot PR - bot only provides suggestions
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./test123/abc

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: latest

      - name: Azure Login
        uses: azure/login@v2
        continue-on-error: true
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        working-directory: ./test123/abc
        id: tf-plan
        run: terraform plan -no-color -out=tfplan 2>&1 | tee plan.txt
        continue-on-error: true

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const planPath = path.join(process.cwd(), 'test123', 'abc', 'plan.txt');
            console.log(`Reading plan from: ${planPath}`);
            
            let planOutput = '';
            try {
              planOutput = fs.readFileSync(planPath, 'utf8');
            } catch (e) {
              console.log(`Could not read plan file: ${e.message}`);
            }
            
            let comment = '';
            if (!planOutput || planOutput.trim() === '') {
              comment = `## 🔴 Terraform Plan Failed\n\nPlease check the GitHub Actions logs for details.\n\n**Common issues:**\n- Missing Azure credentials (configure AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID secrets)\n- Terraform syntax errors in .tf files\n- Invalid terraform.tfvars values`;
            } else {
              comment = `## ✅ Terraform Plan\n\n<details><summary>📄 View Plan Output</summary>\n\n\`\`\`\n${planOutput}\n\`\`\`\n\n</details>`;
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
