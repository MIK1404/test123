name: Terraform Plan

on:
  pull_request:
    branches:
      - main
    paths:
      - 'test123/**'
      - '.github/workflows/terraform-plan.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./abc

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: latest

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan 2>&1 | tee plan.log
        continue-on-error: true

      - name: Check Terraform Errors
        run: |
          if grep -q "Error:" plan.log || [ ! -f tfplan ]; then
            echo "Terraform plan failed!"
            exit 1
          fi

      - name: Comment PR with Plan
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let body = '';
            
            if (fs.existsSync('tfplan')) {
              try {
                const plan = fs.readFileSync('tfplan', 'utf8');
                body = `## Terraform Plan\n\`\`\`\n${plan}\n\`\`\``;
              } catch (err) {
                body = `## Terraform Plan\n\n⚠️ Could not read plan file: ${err.message}`;
              }
            } else {
              body = '## Terraform Plan\n\n❌ Plan failed - check logs for details';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Handle Terraform Errors
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const jobUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            
            let errorLog = '';
            try {
              errorLog = fs.readFileSync('plan.log', 'utf8').split('\n').filter(l => l.includes('Error')).slice(0, 10).join('\n');
            } catch (e) {
              errorLog = 'Could not read error logs';
            }
            
            const body = `## 🔴 Pipeline Failed - Terraform Error Detected
            
[View full logs →](${jobUrl})

**Error Details:**
\`\`\`
${errorLog || 'See logs for details'}
\`\`\`

**Common Fixes:**
1. ✅ **Azure Secrets** - Add to GitHub Settings → Secrets:
   - \`AZURE_CLIENT_ID\`
   - \`AZURE_TENANT_ID\`  
   - \`AZURE_SUBSCRIPTION_ID\`

2. ✅ **Variables** - Check \`terraform.tfvars\`:
   - \`resource_group_name\`
   - \`location\`
   - \`storage_account_name\`

3. ✅ **Files** - Verify all files exist in \`test123/abc/\`

4. ✅ **Azure Access** - Ensure service principal has required permissions`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
