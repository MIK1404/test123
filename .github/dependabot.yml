version: 2
updates:
  # Enable version updates for Terraform
  - package-ecosystem: "terraform"
    directory: "/abc"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "terraform"
    assignees:
      - "MIK1404"
    reviewers:
      - "MIK1404"
    allow:
      - dependency-type: "all"

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    assignees:
      - "MIK1404"
